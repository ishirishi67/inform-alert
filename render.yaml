# Render Blueprint — one always-on Node service that serves the API,
# the WebSocket signaling hub, AND the built web app from a single URL.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: inform-alert
    runtime: node
    plan: free # free tier supports WebSockets; spins down when idle (the client auto-reconnects)
    # --include=dev forces devDependencies (vite, typescript, tsx) to install even
    # though they're needed only at build time — without this the build has no tools.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    # NODE_ENV is intentionally NOT set to "production" here: Render applies env vars
    # during the build too, and NODE_ENV=production makes npm skip devDependencies,
    # breaking the build. PORT is provided automatically and read via process.env.PORT.
    envVars:
      # Web Push signing keys. sync:false = set the values in the Render dashboard
      # (Environment tab), NOT in this file — the private key must stay secret and
      # out of the (public) repo. Stable keys keep push subscriptions valid across
      # the free tier's sleep/restart cycles.
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      # AI call-summary keys (set in the Render dashboard). GROQ_API_KEY powers
      # Whisper transcription (free tier); ANTHROPIC_API_KEY powers the Claude
      # summary. Without them, the "Summarize" button returns a friendly error.
      - key: GROQ_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
